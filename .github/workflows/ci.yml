name: Prompt Capsule CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prompt-capsule-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/validate_prompt_capsules.py
      - run: python scripts/build_prompt_index.py
      - run: python scripts/list_workflows.py
      - uses: actions/upload-artifact@v4
        with:
          name: prompt-index
          path: docs/PROMPT_INDEX.md
