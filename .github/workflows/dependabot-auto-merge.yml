name: Auto Merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' || github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch PR metadata
        uses: actions/checkout@v4
      
      - name: Get PR details
        id: pr-details
        run: |
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo "PR Title: ${{ github.event.pull_request.title }}"
          echo "base: ${{ github.event.pull_request.base.ref }}"
          echo "head: ${{ github.event.pull_request.head.ref }}"
      
      - name: Wait for CI checks to complete
        uses: actions/github-script@v7
        with:
          script: |
            const pull_number = context.payload.pull_request.number;
            
            // Wait for status checks to complete
            await Promise.race([
              (async () => {
                // Poll until checks are complete or timeout
                const maxAttempts = 60;
                for (let i = 0; i < maxAttempts; i++) {
                  const { data: checks } = await github.rest.checks.listForRef({
                    ...context.repo,
                    ref: context.payload.pull_request.head.sha,
                    status: 'completed'
                  });
                  
                  if (checks.total_count > 0) {
                    const allCompleted = checks.check_runs.every(check => check.conclusion !== 'pending');
                    if (allCompleted) return;
                  }
                  
                  await new Promise(r => setTimeout(r, 10000)); // Wait 10 seconds
                }
              })(),
              new Promise(r => setTimeout(r, 30 * 60 * 1000)) // 30 min timeout
            ]);
            
            console.log('CI checks completed or timeout reached');

      - name: Check CI status
        id: ci-status
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const pull_number = context.payload.pull_request.number;
            
            const { data: checks } = await github.rest.checks.listForRef({
              ...context.repo,
              ref: context.payload.pull_request.head.sha,
              status: 'completed'
            });
            
            // Get commit status checks
            const { data: statuses } = await github.rest.repos.listCommitStatusesForRef({
              ...context.repo,
              ref: context.payload.pull_request.head.sha
            });
            
            const allChecks = [
              ...checks.check_runs.map(c => ({ name: c.name, conclusion: c.conclusion })),
              ...statuses.map(s => ({ name: s.context || s.context, conclusion: s.state }))
            ];
            
            console.log('All checks:', JSON.stringify(allChecks, null, 2));
            
            const failedChecks = allChecks.filter(c => 
              c.conclusion === 'failure' || c.conclusion === 'error' ||
              c.conclusion === 'FAILURE' || c.conclusion === 'ERROR'
            );
            
            if (failedChecks.length > 0) {
              console.log('Failed checks:', failedChecks);
              core.setFailed(`Some checks failed: ${failedChecks.map(c => c.name).join(', ')}`);
            }
            
            core.setOutput('failed', failedChecks.length > 0);

      - name: Merge PR if CI passes
        if: steps.ci-status.outputs.failed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pull_number = context.payload.pull_request.number;
            
            // Check if PR is mergeable
            const { data: pr } = await github.rest.pulls.get({
              ...context.repo,
              pull_number
            });
            
            if (pr.mergeable !== true) {
              console.log('PR is not mergeable yet');
              core.setOutput('merged', false);
              return;
            }
            
            // Merge the PR
            try {
              await github.rest.pulls.merge({
                ...context.repo,
                pull_number,
                merge_method: 'squash',
                commit_title: `squash: ${pr.title} (#${pull_number}) [bot]`
              });
              console.log('PR merged successfully');
              core.setOutput('merged', true);
            } catch (error) {
              console.log('Failed to merge PR:', error.message);
              core.setOutput('merged', false);
            }